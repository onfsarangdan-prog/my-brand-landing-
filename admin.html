<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMEA — 운영자 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .admin-wrap{max-width:760px;margin:0 auto;padding:60px 24px 100px;}
  .gate{
    max-width:360px;margin:120px auto;text-align:center;
  }
  .gate input{margin-bottom:14px;}
  .gate p.err{color:#D26B5A;font-size:14px;min-height:18px;margin:0 0 10px;}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin:32px 0 40px;}
  .metric-card{
    background:var(--bg-elevated);border:1px solid var(--line);border-radius:16px;
    padding:20px 22px;
  }
  .metric-card .label{font-size:13px;color:var(--ink-soft);margin:0 0 6px;}
  .metric-card .value{font-family:'Manrope',sans-serif;font-size:28px;font-weight:700;margin:0;}
  .chart-box{
    background:var(--bg-elevated);border:1px solid var(--line);border-radius:16px;
    padding:24px;margin-bottom:40px;position:relative;height:260px;
  }
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);}
  th{color:var(--ink-soft);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.04em;}
  .hidden{display:none;}
  .logout{font-size:13px;color:var(--ink-soft);text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <span class="wordmark">LUMEA · Admin</span>
    <button id="logoutBtn" class="logout hidden">잠그기</button>
  </div>
</nav>

<div id="gate" class="gate">
  <p style="margin-bottom:18px;color:var(--ink-soft);font-size:15px;">암호를 입력하면 대시보드가 열립니다</p>
  <input id="passcodeInput" type="password" placeholder="암호 입력">
  <p id="gateErr" class="err"></p>
  <button id="enterBtn" class="btn-primary btn-block">입장하기</button>
</div>

<div id="dashboard" class="admin-wrap hidden">
  <div class="metrics">
    <div class="metric-card">
      <p class="label">총 신청자 수</p>
      <p class="value" id="totalCount">0</p>
    </div>
    <div class="metric-card">
      <p class="label">오늘 신청자 수</p>
      <p class="value" id="todayCount">0</p>
    </div>
    <div class="metric-card">
      <p class="label">평균 구매 의향</p>
      <p class="value" id="avgIntent">0.0<span style="font-size:14px;color:var(--ink-soft);"> / 5</span></p>
    </div>
    <div class="metric-card">
      <p class="label">우수 리드 (4점 이상)</p>
      <p class="value" id="hotLeadCount">0</p>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="dailyChart" role="img" aria-label="일별 신청자 수 추이 막대그래프"></canvas>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
    <div class="chart-box" style="height:220px;">
      <canvas id="ageChart" role="img" aria-label="연령대별 신청자 분포 막대그래프"></canvas>
    </div>
    <div class="chart-box" style="height:220px;">
      <canvas id="regionChart" role="img" aria-label="지역별 신청자 분포 막대그래프"></canvas>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px;">
    <div class="chart-box" style="height:220px;">
      <canvas id="channelChart" role="img" aria-label="유입 경로별 신청자 분포 막대그래프"></canvas>
    </div>
    <div class="chart-box" style="height:220px;">
      <canvas id="priceChart" role="img" aria-label="희망 가격대별 신청자 분포 막대그래프"></canvas>
    </div>
  </div>

  <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
    <h3 style="font-family:'Inter',sans-serif;font-size:15px;margin:0;flex:1;">전체 신청자</h3>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);">
      <input type="checkbox" id="hotLeadOnly" style="width:auto;padding:0;">
      우수 리드만 보기
    </label>
    <input id="searchInput" type="text" placeholder="이름 또는 이메일 검색" style="max-width:220px;">
    <button id="exportBtn" class="btn-primary" style="padding:10px 18px;font-size:13px;">CSV 다운로드</button>
  </div>
  <table>
    <thead>
      <tr><th>이름</th><th>이메일</th><th>연령대</th><th>지역</th><th>경로</th><th>가격대</th><th>의향</th><th>신청일</th><th></th></tr>
    </thead>
    <tbody id="recentRows"></tbody>
  </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  // 이 암호는 프론트엔드 코드 안에 있어서 완전히 안전하지는 않습니다.
  // 발표/과제 제출용으로 간단히 접근을 제한하는 용도로만 사용하세요.
  const PASSCODE = 'lumea2026';

  const SUPABASE_URL = 'https://ixyiocarjhkqmytlfgoa.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_n65G5dgJYztBtP3YtSwMjA_PGEBmXUA';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const gate = document.getElementById('gate');
  const dashboard = document.getElementById('dashboard');
  const logoutBtn = document.getElementById('logoutBtn');
  const passcodeInput = document.getElementById('passcodeInput');
  const gateErr = document.getElementById('gateErr');

  document.getElementById('enterBtn').addEventListener('click', tryEnter);
  passcodeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryEnter(); });

  function tryEnter(){
    if (passcodeInput.value === PASSCODE){
      gate.classList.add('hidden');
      dashboard.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
      loadDashboard();
    } else {
      gateErr.textContent = '암호가 올바르지 않아요.';
    }
  }

  logoutBtn.addEventListener('click', () => {
    dashboard.classList.add('hidden');
    logoutBtn.classList.add('hidden');
    gate.classList.remove('hidden');
    passcodeInput.value = '';
  });

  let allRows = [];

  async function loadDashboard(){
    const { data, error } = await supabase
      .from('waitlist')
      .select('id, name, email, age_group, region, channel, price_range, purchase_intent, reason, created_at')
      .order('created_at', { ascending: false });

    if (error){
      console.error(error);
      return;
    }

    allRows = data;
    document.getElementById('totalCount').textContent = data.length.toLocaleString('ko-KR');

    const todayStr = new Date().toISOString().slice(0,10);
    const todayCount = data.filter(r => r.created_at.slice(0,10) === todayStr).length;
    document.getElementById('todayCount').textContent = todayCount.toLocaleString('ko-KR');

    const intents = data.map(r => r.purchase_intent).filter(v => v != null);
    const avgIntent = intents.length ? (intents.reduce((a,b) => a+b, 0) / intents.length) : 0;
    document.getElementById('avgIntent').innerHTML = avgIntent.toFixed(1) + '<span style="font-size:14px;color:var(--ink-soft);"> / 5</span>';

    const hotLeads = data.filter(r => (r.purchase_intent || 0) >= 4).length;
    document.getElementById('hotLeadCount').textContent = hotLeads.toLocaleString('ko-KR');

    renderDailyChart(data);
    renderBreakdownChart('ageChart', data, 'age_group', ['10대','20대','30대','40대','50대 이상']);
    renderBreakdownChart('regionChart', data, 'region', ['서울','경기·인천','강원','충청','전라','경상','제주','해외/기타']);
    renderBreakdownChart('channelChart', data, 'channel', ['인스타그램','지인 추천','검색','기타']);
    renderBreakdownChart('priceChart', data, 'price_range', ['3만원대','5만원대','7만원대','10만원 이상']);
    renderRows(data);
  }

  function renderDailyChart(data){
    const byDate = {};
    data.forEach(r => {
      const d = r.created_at.slice(0,10);
      byDate[d] = (byDate[d] || 0) + 1;
    });
    const dates = Object.keys(byDate).sort();
    const counts = dates.map(d => byDate[d]);

    new Chart(document.getElementById('dailyChart'), {
      type: 'bar',
      data: { labels: dates, datasets: [{ data: counts, backgroundColor: '#C9924E', borderRadius: 4, maxBarThickness: 28 }] },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false }, title:{ display:true, text:'일별 신청 추이' } },
        scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } }, x:{ grid:{ display:false } } }
      }
    });
  }

  function renderBreakdownChart(canvasId, data, field, order){
    const counts = {};
    order.forEach(k => counts[k] = 0);
    data.forEach(r => {
      const v = r[field] || '미상';
      counts[v] = (counts[v] || 0) + 1;
    });
    const labels = Object.keys(counts);
    const values = Object.values(counts);
    const titleMap = { age_group: '연령대별 분포', region: '지역별 분포', channel: '유입 경로별 분포', price_range: '희망 가격대별 분포' };

    new Chart(document.getElementById(canvasId), {
      type: 'bar',
      data: { labels, datasets: [{ data: values, backgroundColor: '#7C9A84', borderRadius: 4, maxBarThickness: 26 }] },
      options: {
        indexAxis: 'y',
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false }, title:{ display:true, text: titleMap[field] } },
        scales:{ x:{ beginAtZero:true, ticks:{ precision:0 } }, y:{ grid:{ display:false } } }
      }
    });
  }

  function renderRows(data){
    const rows = data.map(r => {
      const isHot = (r.purchase_intent || 0) >= 4;
      return `
      <tr data-id="${r.id}" style="${isHot ? 'background:color-mix(in srgb, var(--accent) 12%, transparent);' : ''}">
        <td>${escapeHtml(r.name)}</td>
        <td>${escapeHtml(r.email)}</td>
        <td>${escapeHtml(r.age_group || '-')}</td>
        <td>${escapeHtml(r.region || '-')}</td>
        <td>${escapeHtml(r.channel || '-')}</td>
        <td>${escapeHtml(r.price_range || '-')}</td>
        <td>${r.purchase_intent != null ? r.purchase_intent + '점' : '-'}${isHot ? ' 🔥' : ''}</td>
        <td>${new Date(r.created_at).toLocaleDateString('ko-KR')}</td>
        <td><button class="deleteBtn" data-id="${r.id}" style="background:none;border:none;color:#D26B5A;cursor:pointer;font-size:13px;">삭제</button></td>
      </tr>
    `;
    }).join('');
    document.getElementById('recentRows').innerHTML = rows;

    document.querySelectorAll('.deleteBtn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('이 신청 내역을 삭제할까요?')) return;
        const id = btn.dataset.id;
        const { error } = await supabase.from('waitlist').delete().eq('id', id);
        if (error){
          alert('삭제 중 문제가 생겼어요: ' + error.message);
          return;
        }
        loadDashboard();
      });
    });
  }

  function applyFilters(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const hotOnly = document.getElementById('hotLeadOnly').checked;
    let filtered = allRows.filter(r =>
      r.name.toLowerCase().includes(q) || r.email.toLowerCase().includes(q)
    );
    if (hotOnly) filtered = filtered.filter(r => (r.purchase_intent || 0) >= 4);
    renderRows(filtered);
  }

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('hotLeadOnly').addEventListener('change', applyFilters);

  document.getElementById('exportBtn').addEventListener('click', () => {
    const header = ['이름','이메일','연령대','지역','유입경로','희망가격대','구매의향','이유','신청일'];
    const lines = [header.join(',')];
    allRows.forEach(r => {
      const line = [r.name, r.email, r.age_group || '', r.region || '', r.channel || '', r.price_range || '', r.purchase_intent ?? '', (r.reason || '').replace(/,/g,' '), r.created_at]
        .map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
      lines.push(line);
    });
    const csv = '\uFEFF' + lines.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `lumea_waitlist_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }
</script>

</body>
</html>
